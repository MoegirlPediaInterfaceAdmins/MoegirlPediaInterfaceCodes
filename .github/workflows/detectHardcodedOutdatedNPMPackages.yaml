name: Detect hardcoded-outdated NPM packages
permissions:
  contents: read
  issues: write
  actions: write

on:
  workflow_dispatch:
  schedule:
    - cron: 0 23 * * * # Every 07:00 CST

concurrency: detectHardcodedOutdatedNPMPackages

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  generateConfiguration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          show-progress: false
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: lts/*
          check-latest: true
          cache: npm
      - name: Installing the dependencies
        uses: AnnAngela/cached_node-modules@8336d5acec06f1670b1097dc0b424527a8481659 # v6
        with:
          command: npm run ci
      - name: Detect hardcoded-outdated NPM packages
        run: node scripts/detectHardcodedOutdatedNPMPackages/index.js
